name: Sentiment Pipeline — Auto Update

on:
  schedule:
    - cron: '0 2,14 * * *'   # Runs at 02:00 and 14:00 UTC (7:30 AM and 7:30 PM IST)
  workflow_dispatch:           # Also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sentiment pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py --rss-only --limit 100

      - name: Commit and push updated data
        run: |
          git config user.name  "Sentiment Bot"
          git config user.email "sentiment-bot@github.com"
          git add data/sentiment.db config/calibration.json
          git diff --staged --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push