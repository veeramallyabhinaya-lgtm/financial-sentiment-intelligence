name: Sentiment Pipeline (Twice Daily)

on:
  schedule:
    # Cron times are in UTC. IST = UTC+5:30.
    # 30 3  * * 1-5  ->  09:00 IST, Mon-Fri  (before/around market open)
    # 30 12 * * 1-5  ->  18:00 IST, Mon-Fri  (after market close)
    - cron: "30 3 * * 1-5"
    - cron: "30 12 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the workflow can commit the updated DB back
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sentiment pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python3 main.py --rss-only

      # Persist the SQLite DB (articles/signals/scored_pairs) between runs so
      # cross-run dedup and rolling-window calculations keep working, since
      # GitHub Actions runners start fresh each time otherwise.
      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sentiment.db
          git diff --staged --quiet || git commit -m "Update sentiment DB [skip ci]"
          git push
